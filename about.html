<head>
    <meta charset="utf-8">
    <meta name="description" content="About">
    <title> about </title>
    <style>
        body {
            background-color: rgb(105, 79, 130);
            font-family: monospace;
            color: aliceblue;
            margin-top: 100px;
            text-align: center;
        }

        .flower {
            position: fixed;
            top: -50px;
            font-size: 24px;
            animation: floatDown linear infinite;
            opacity: 0.8;
        }

        @keyframes floatDown {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <h1>
        1. kkotshin
    </h1>
    <h2>
        꽃무늬나 여러 가지 색깔을 넣어 예쁘게 장식한 신발.

    </h2>
    <h2>
        flower shoes: Traditional Korean shoes. Lavish floral embroidered shoes with a slight heel and upturned toes.
    </h2>
    <script>
        const flowerCount = 50;
        const flowerEmojis = ['🪷', '🪻', '🌺', '🌼', '❁'];
        for (let i = 0; i < flowerCount; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];

            flower.style.left = `${Math.random() * 100}vw`;
            flower.style.animationDuration = `${8 + Math.random() * 7}s`;
            flower.style.fontSize = `${15 + Math.random() * 15}px`;
            document.body.appendChild(flower);
        }
    </script>
</body>
